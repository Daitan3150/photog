name = "next-portfolio-worker"
main = "src/workers/upload-worker.ts"
compatibility_date = "2024-02-18"
pages_build_output_dir = ".vercel/output"

# 🍖 胃: R2 バケットの紐付け
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "photo-temp-storage"

# ⚡ 神経: キューの設定
[[queues.consumers]]
queue = "upload-queue"
max_batch_size = 5
max_batch_timeout = 10

[[queues.producers]]
queue = "upload-queue"
binding = "UPLOAD_QUEUE"

# 🧠 記憶: KV の設定
[[kv_namespaces]]
binding = "CACHE_KV"
id = "341e3a1d712e4afabb120840d7744910"

# 🧠 知識: D1 の設定
[[d1_databases]]
binding = "DB"
database_name = "next-portfolio-db"
database_id = "dfb28432-3d8a-4f72-8557-7e53ed24b46c"
